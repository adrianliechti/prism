# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  start:
    cmds:
      - npm run build
      - go run ./cmd/prism

  client:
    cmds:
      - npm run dev

  server:
    cmds:
      - go run ./cmd/prism -server -port 9999

  install:
    cmds:
      - cmd: go install ./cmd/prism
      - task: install-darwin
      - task: install-windows

  install-darwin:
    platforms: [darwin]
    cmds:
      - task: build
      - cmd: mkdir -p ~/Applications
      - cmd: rm -rf ~/Applications/Prism.app
      - cmd: mv app/build/bin/Prism.app ~/Applications/

  install-windows:
    platforms: [windows]
    cmds:
      # Task runs cmds through its built-in POSIX shell (mvdan/sh) even on
      # Windows, so env vars expand as $VAR, not %VAR%.
      - task: build
      - cmd: mkdir -p "$LOCALAPPDATA/Programs"
      - cmd: rm -f "$LOCALAPPDATA/Programs/Prism.exe"
      - cmd: mv app/build/bin/Prism.exe "$LOCALAPPDATA/Programs/"

  build:
    desc: Build the desktop app for this platform (Prism.app / Prism.exe); all resources are generated from app/appicon.png
    cmds:
      - go tool appbundle -name Prism -id com.adrianliechti.prism -description "Prism - API Client" -company "Adrian Liechti" -copyright "© Adrian Liechti" -package ./app

  ui:
    desc: Build the web UI assets
    cmds:
      - npm install
      - npm run build

  release:app:
    desc: Release the macOS desktop app + Homebrew cask (macOS only; needs GITHUB_TOKEN)
    cmds:
      # --skip=validate: skip git-state checks so snapshot/dry runs work from a dirty tree.
      - goreleaser release --clean --skip=validate -f .goreleaser.app.yml

  release:cli:
    desc: Release the CLI for all platforms + Homebrew cask (needs GITHUB_TOKEN)
    cmds:
      # --skip=validate: the UI build hook regenerates the tracked dist/ folder, dirtying the tree.
      - goreleaser release --clean --skip=validate -f .goreleaser.yml

  release:
    desc: Full release — CLI (all platforms) then the desktop app, on the current git tag
    cmds:
      - task: release:cli
      - task: release:app
