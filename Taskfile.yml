# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  install:
    cmds:
      - task: install-darwin
      - task: install-windows

  install-darwin:
    platforms: [darwin]
    cmds:
      - task: build
      - cmd: mkdir -p ~/Applications
      - cmd: rm -rf ~/Applications/Prism.app
      - cmd: mv app/build/bin/Prism.app ~/Applications/

  install-windows:
    platforms: [windows]
    cmds:
      - task: build
      - cmd: mkdir -p %LOCALAPPDATA%\Programs
      - cmd: rm -f %LOCALAPPDATA%\Programs\Prism.exe
      - cmd: mv app/build/bin/Prism.exe %LOCALAPPDATA%\Programs\

  build:
    desc: Build the Wails desktop app
    deps: [ui]
    dir: app
    cmds:
      # Pinned wails CLI (keep in sync with app/go.mod / .goreleaser.app.yml).
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.11.0 build -clean

  run:app:
    desc: Build and launch the Wails desktop app
    deps: [ui]
    dir: app
    cmds:
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.11.0 build -clean
      - open -n "build/bin/Prism.app"

  release:cli:
    desc: Release the CLI for all platforms + Homebrew cask (needs GITHUB_TOKEN)
    cmds:
      # --skip=validate: the UI build hook regenerates the tracked dist/ folder, dirtying the tree.
      - goreleaser release --clean --skip=validate -f .goreleaser.yml

  release:app:
    desc: Release the macOS desktop app + Homebrew cask (macOS only; needs GITHUB_TOKEN)
    cmds:
      - goreleaser release --clean --skip=validate -f .goreleaser.app.yml

  release:
    desc: Full release — CLI (all platforms) then the desktop app, on the current git tag
    cmds:
      - task: release:cli
      - task: release:app

  ui:
    desc: Build the web UI assets
    cmds:
      - npm install
      - npm run build

  start:
    cmds:
      - npm run build
      - go run ./cmd/prism

  client:
    cmds:
      - npm run dev

  server:
    cmds:
      - go run ./cmd/prism -server -port 9999
